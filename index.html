<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reelspot Video Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    position:relative;
}

.container{
    width:90%;
    max-width:900px;
    text-align:center;
    position:relative;
    z-index:1;
}

h1{
    font-size:48px;
    margin-bottom:15px;
    background:linear-gradient(90deg,#00d4ff,#7b2cbf);
    background-clip:text;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:#e0e0e0;
    margin-bottom:30px;
    font-size:18px;
    letter-spacing:0.5px;
}

.video-box{
    overflow:hidden;
    border-radius:24px;
    box-shadow:0 25px 50px rgba(0,0,0,.5);
    border:2px solid rgba(255,255,255,0.1);
}

video{
    width:100%;
    display:block;
    background:#000;
    border-radius:22px;
}

.cta-button{
    display:none;
    margin-top:35px;
    padding:18px 50px;
    font-size:20px;
    font-weight:bold;
    color:white;
    background:linear-gradient(90deg,#00d4ff,#7b2cbf);
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow:0 15px 35px rgba(0,212,255,0.4);
}

.cta-button:hover{
    transform:translateY(-3px);
    box-shadow:0 20px 40px rgba(0,212,255,0.5);
}

.cta-button:active{
    transform:translateY(-1px);
}

.features{
    margin-top:50px;
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
}

.feature{
    flex:1;
    min-width:200px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.1);
    transition:transform 0.2s ease, background 0.2s ease;
}

.feature:hover{
    background:rgba(255,255,255,0.12);
    transform:translateY(-3px);
}

.feature h3{
    color:#00d4ff;
    margin-bottom:12px;
    font-size:22px;
}

.feature p{
    color:#cfcfcf;
    font-size:15px;
    line-height:1.5;
}

@media(max-width:768px){
    h1{
        font-size:32px;
    }
    .subtitle{
        font-size:16px;
    }
    .cta-button{
        padding:15px 40px;
        font-size:18px;
    }
}

</style>

</head>

<body>

<div class="container">

<h1>Reelspot Video Player</h1>

<p class="subtitle">
Watch the video Ad For 15 Seconds and Continue.
</p>

<div class="video-box">

<video id="videoPlayer" controls autoplay muted playsinline>

<source src="VDO.mp4" type="video/mp4">

Your browser does not support HTML5 video.

</video>

</div>

<button id="ctaButton" class="cta-button">
continue
</button>

</div>

<!-- ========================= -->
<!-- Paste HilltopAds Code Here -->
<!-- ========================= -->

<script>

const btn = document.getElementById("ctaButton");
const video = document.getElementById("videoPlayer");

// Set minimal volume
video.volume = 0.15;

// Unmute on user interaction
document.addEventListener('click', function() {
    if (video.muted) {
        video.muted = false;
    }
});

// Show button after 15 seconds
setTimeout(function(){

    btn.style.display="inline-block";

},15000);

// Redirect
btn.addEventListener("click",function(){

    window.location.href="https://reelspot24.github.io/reelspot/";

});

</script>

</body>
</html>
